title: UKDRI Presentation Template
author: Gabriel Mateus Bernardo Harrington
version: 0.0.1
quarto-required: ">=1.2.0"
contributes:
  formats:
    revealjs:
       theme: [default, ukdri.scss]
       width: 1440
       height: 810
       #logo: logo-small.svg
       footer: |
         [UKDRI](https://ukdri.ac.uk/) Quarto theme · [GitHub](https://github.com/H-Mateus/quarto-ukdri-theme)
       slide-number: c/t
       show-slide-number: all
       background-image: main_slide_background.png
       background-position: center 56%
       parallax-background-size: contain
       title-slide-attributes:
          data-background-image: title_background2.png
          data-background-size: contain
          presentation-heading-color: #FFFFFF
       preview-links: true
       bibliography: [references.bib, packages.bib]
